<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Local Privada</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
    <div id="chat-container">
        <div id="chat-history"></div>

        <div id="status-bar">
            <span id="ai-status">Verificando compatibilidade WebGPU...</span>
            <progress id="download-progress" value="0" max="100" style="display: none;"></progress>
        </div>

        <div id="input-area">
            <textarea id="user-input" placeholder="Digite sua mensagem..." disabled></textarea>
            <button id="send-btn" disabled>Enviar</button>
        </div>
    </div>
    <script src="app.js" type="module"></script>
</body>
</html>
